<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe AI</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background:#0f0f1a;
  font-family: Arial, sans-serif;
}
.game-cell{
  background:rgba(255,255,255,0.05);
}
.game-cell:hover{
  background:rgba(99,102,241,0.15);
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen text-white">

<div class="text-center">

<h1 class="text-4xl font-bold mb-8">TIC TAC TOE</h1>

<div id="home-screen">
  <button onclick="startGame()"
  class="px-8 py-3 bg-indigo-600 rounded-full hover:scale-105 transition">
  Start Game
  </button>
</div>

<div id="game-screen" class="hidden">
  <div id="board" class="grid grid-cols-3 gap-3 w-72 mx-auto mb-6"></div>
  <button onclick="goHome()" class="px-6 py-2 bg-gray-700 rounded">Home</button>
</div>

<div id="result" class="hidden mt-6 text-xl font-semibold"></div>

</div>

<script>
let board = ["","","","","","","","",""];
let gameActive = false;

const winPatterns = [
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

function startGame(){
  board = ["","","","","","","","",""];
  gameActive = true;
  document.getElementById("home-screen").classList.add("hidden");
  document.getElementById("result").classList.add("hidden");
  document.getElementById("game-screen").classList.remove("hidden");
  initBoard();
}

function goHome(){
  document.getElementById("game-screen").classList.add("hidden");
  document.getElementById("home-screen").classList.remove("hidden");
}

function initBoard(){
  const boardEl = document.getElementById("board");
  boardEl.innerHTML="";
  for(let i=0;i<9;i++){
    const cell=document.createElement("div");
    cell.className="game-cell w-20 h-20 flex items-center justify-center text-3xl font-bold cursor-pointer rounded";
    cell.onclick=()=>handleClick(i);
    boardEl.appendChild(cell);
  }
}

function handleClick(i){
  if(!gameActive || board[i]!="") return;

  board[i]="X";
  updateBoard();
  if(checkEnd()) return;

  setTimeout(()=>{
    aiMove();
    updateBoard();
    checkEnd();
  },300);
}

function aiMove(){
  let empty=board.map((v,i)=>v==""?i:null).filter(v=>v!=null);
  if(empty.length==0) return;
  let move=empty[Math.floor(Math.random()*empty.length)];
  board[move]="O";
}

function updateBoard(){
  const cells=document.querySelectorAll(".game-cell");
  cells.forEach((cell,i)=>{
    cell.textContent=board[i];
  });
}

function checkWinner(){
  for(let pattern of winPatterns){
    const [a,b,c]=pattern;
    if(board[a] && board[a]==board[b] && board[a]==board[c]){
      return board[a];
    }
  }
  return null;
}

function checkEnd(){
  let winner=checkWinner();
  if(winner){
    gameActive=false;
    showResult(winner=="X"?"You Win!":"AI Wins!");
    return true;
  }
  if(!board.includes("")){
    gameActive=false;
    showResult("Draw!");
    return true;
  }
  return false;
}

function showResult(msg){
  document.getElementById("result").textContent=msg;
  document.getElementById("result").classList.remove("hidden");
}
</script>

</body>
</html>
