<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe – Hard AI</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * { font-family: 'Outfit', sans-serif; }
    .mono { font-family: 'Space Mono', monospace; }
    .cell:hover:not(.filled) { background: rgba(99,102,241,.2); }
  </style>
</head>

<body class="h-full bg-[#0f0f1a] text-white">

<div class="h-full flex items-center justify-center">

<!-- HOME -->
<div id="home" class="text-center">
  <h1 class="mono text-5xl mb-3">TIC TAC TOE</h1>
  <p class="text-gray-400 mb-8">Player vs AI (Hard)</p>
  <button onclick="startGame()" class="px-10 py-4 bg-indigo-500 rounded-full hover:scale-105 transition">
    Start Game
  </button>
</div>

<!-- GAME -->
<div id="game" class="hidden text-center">
  <p id="turn" class="mb-5 text-lg">Your Turn (X)</p>
  <div id="board" class="grid grid-cols-3 gap-3 mb-6"></div>
  <button onclick="goHome()" class="text-gray-400 underline">Back</button>
</div>

<!-- RESULT -->
<div id="result" class="hidden text-center">
  <h2 id="resultText" class="text-4xl font-bold mb-6"></h2>
  <button onclick="startGame()" class="px-8 py-3 bg-indigo-500 rounded-full">
    Play Again
  </button>
</div>

</div>

<script>
/* ---------------- VARIABLES ---------------- */
let board = ["","","","","","","","",""];
let gameActive = true;

const winPatterns = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

/* ---------------- SCREEN CONTROL ---------------- */
function show(id){
  ["home","game","result"].forEach(s =>
    document.getElementById(s).classList.add("hidden")
  );
  document.getElementById(id).classList.remove("hidden");
}

/* ---------------- GAME START ---------------- */
function startGame(){
  board = ["","","","","","","","",""];
  gameActive = true;
  show("game");
  document.getElementById("turn").innerText = "Your Turn (X)";
  initBoard();
}

function goHome(){
  show("home");
}

/* ---------------- BOARD ---------------- */
function initBoard(){
  const b = document.getElementById("board");
  b.innerHTML = "";
  for(let i=0;i<9;i++){
    const cell = document.createElement("div");
    cell.className = "cell aspect-square bg-[#1a1a2e] rounded-xl flex items-center justify-center text-4xl cursor-pointer";
    cell.onclick = () => playerMove(i, cell);
    b.appendChild(cell);
  }
}

/* ---------------- PLAYER MOVE ---------------- */
function playerMove(i, cell){
  if(!gameActive || board[i] !== "") return;

  board[i] = "X";
  cell.innerText = "X";
  cell.classList.add("filled");

  if(checkEnd("X")) return;

  document.getElementById("turn").innerText = "AI Thinking...";
  setTimeout(aiMove, 400);
}

/* ---------------- HARD AI (MINIMAX) ---------------- */
function aiMove(){
  let bestScore = -Infinity;
  let move;

  for(let i=0;i<9;i++){
    if(board[i] === ""){
      board[i] = "O";
      let score = minimax(board, false);
      board[i] = "";
      if(score > bestScore){
        bestScore = score;
        move = i;
      }
    }
  }

  board[move] = "O";
  const cell = document.getElementById("board").children[move];
  cell.innerText = "O";
  cell.classList.add("filled");

  if(checkEnd("O")) return;
  document.getElementById("turn").innerText = "Your Turn (X)";
}

const scores = { X: -1, O: 1, tie: 0 };

function minimax(boardState, isMaximizing){
  let result = checkWinner();
  if(result !== null) return scores[result];

  if(isMaximizing){
    let best = -Infinity;
    for(let i=0;i<9;i++){
      if(boardState[i] === ""){
        boardState[i] = "O";
        best = Math.max(best, minimax(boardState, false));
        boardState[i] = "";
      }
    }
    return best;
  } else {
    let best = Infinity;
    for(let i=0;i<9;i++){
      if(boardState[i] === ""){
        boardState[i] = "X";
        best = Math.min(best, minimax(boardState, true));
        boardState[i] = "";
      }
    }
    return best;
  }
}

/* ---------------- RESULT CHECK ---------------- */
function checkWinner(){
  for(const [a,b,c] of winPatterns){
    if(board[a] && board[a] === board[b] && board[a] === board[c]){
      return board[a];
    }
  }
  if(!board.includes("")) return "tie";
  return null;
}

function checkEnd(player){
  let res = checkWinner();
  if(res){
    gameActive = false;
    document.getElementById("resultText").innerText =
      res === "tie" ? "Draw 🤝" : (res === "X" ? "You Win 🎉" : "AI Wins 🤖");
    show("result");
    return true;
  }
  return false;
}
</script>

</body>
</html>
